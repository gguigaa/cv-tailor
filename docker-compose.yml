services:
  cv-tailor:
    build: ./backend
    container_name: cv-tailor
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./frontend:/app/frontend
    ports:
      - "127.0.0.1:8100:8000"
    networks:
      - cloud_cloud

networks:
  cloud_cloud:
    external: true
